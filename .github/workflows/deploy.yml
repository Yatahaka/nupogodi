name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64
          actions-cache-folder: emsdk-cache

      - name: Check emcc version
        run: emcc --version

      - name: Configure
        run: emcmake cmake -S . -B build

      - name: Build
        run: |
          cd build
          emmake make -j2

      - name: List build output
        run: ls -la build/

      - name: Copy to dist
        run: |
          mkdir -p dist
          HTML=$(find build -maxdepth 1 -name "*.html" | head -1)
          BASE="${HTML%.html}"
          echo "Found: $HTML"
          cp "$HTML"       dist/index.html
          cp "${BASE}.js"  dist/
          cp "${BASE}.wasm" dist/
          ls -la dist/

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deploy
