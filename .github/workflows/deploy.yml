name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.64

      - name: Check emcc
        run: emcc --version

      - name: Configure
        run: emcmake cmake -S . -B build

      - name: Build
        run: |
          cd build
          emmake make -j2

      - name: Show build output
        run: ls -la build/

      - name: Copy to docs/
        run: |
          rm -rf docs
          mkdir docs
          HTML=$(find build -maxdepth 1 -name "*.html" | head -1)
          BASE="${HTML%.html}"
          echo "HTML: $HTML  BASE: $BASE"
          cp "$HTML"        docs/index.html
          cp "${BASE}.js"   docs/
          cp "${BASE}.wasm" docs/
          ls -la docs/

      - name: Commit docs/ to main
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --cached --quiet || git commit -m "chore: update built WASM [skip ci]"
          git push
